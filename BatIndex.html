<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penny — Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1B2B4B; --green: #2D6A4F; --green-light: #EAF2EC; --green-mid: #52B788;
    --cream: #FAFAF7; --surface: #FFFFFF; --border: #E8E8E2; --text: #1B2B4B; --text-muted: #6B7280; --red: #C0392B;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  a { text-decoration: none; color: inherit; }
  
  .layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .sidebar { background: var(--navy); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
  .sidebar-logo { padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 10px; }
  .logo-coin { width: 34px; height: 34px; background: var(--green-mid); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px;}
  .logo-name { font-family: Georgia, serif; font-size: 18px; color: #fff; }
  
  .sidebar-nav { padding: 14px; flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 9px; font-size: 13.5px; color: rgba(255,255,255,0.55); margin-bottom: 4px; transition: 0.2s; }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
  .nav-item.on { background: rgba(82,183,136,0.18); color: var(--green-mid); }
  
  .main { display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
  
  .top-navbar { display: flex; justify-content: flex-end; align-items: center; padding: 12px 28px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 16px; position: sticky; top: 0; z-index: 10; }
  .top-navbar .user-tag { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .top-navbar .auth-btn { display: flex; align-items: center; gap: 6px; background: var(--red-light); color: var(--red); border: none; border-radius: 99px; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.15s; }
  .top-navbar .auth-btn:hover { background: #FADBD8; }

  .content-pad { padding: 24px 28px; }
  .topbar { margin-bottom: 24px; }
  .greeting { font-family: Georgia, serif; font-size: 24px; font-weight: normal; }
  .greeting-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
  .sc { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
  .sl { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .sv { font-size: 28px; font-weight: 500; font-family: Georgia, serif; }
  
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px; }
  .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-coin"><i class="ti ti-coin"></i></div>
      <div class="logo-name">Penny</div>
    </div>
    <div class="sidebar-nav">
      <a href="BatIndex.html" class="nav-item on"><i class="ti ti-home"></i> Dashboard</a>
      <a href="BatServices.html" class="nav-item"><i class="ti ti-briefcase"></i> Services</a>
      <a href="BatCreditCard.html" class="nav-item"><i class="ti ti-credit-card"></i> Card Strategy</a>
      <a href="BatProfile.html" class="nav-item"><i class="ti ti-user"></i> Profile</a>
      <a href="BatAbout.html" class="nav-item"><i class="ti ti-info-circle"></i> About</a>
    </div>
  </div>

  <div class="main">
    <div class="top-navbar">
      <div class="user-tag"><i class="ti ti-user-circle"></i> <span id="topEmailLabel">Loading...</span></div>
      <button onclick="logout()" class="auth-btn"><i class="ti ti-logout"></i> Sign Out</button>
    </div>

    <div class="content-pad">
      <div class="topbar">
        <div class="greeting">Good morning, <span id="disp-name">User</span></div>
        <div class="greeting-sub">Here is your financial snapshot for today.</div>
      </div>
      
      <div class="stat-grid">
        <div class="sc"><div class="sl"><i class="ti ti-wallet"></i> Total Balance</div><div class="sv" id="dash-balance">$0</div></div>
        <div class="sc"><div class="sl"><i class="ti ti-shield-check"></i> Emergency Fund</div><div class="sv" id="dash-efund">$0</div></div>
        <div class="sc"><div class="sl"><i class="ti ti-arrow-up-circle"></i> Spent This Month</div><div class="sv" id="dash-spent">$0</div></div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-chart-line"></i> Monthly Wealth Value (6 Months)</div>
        <canvas id="balanceChart" height="80"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
  const currentUser = localStorage.getItem('currentUser');
  if(!currentUser) { window.location.href = 'BatSignup.html'; }
  else { document.getElementById('topEmailLabel').textContent = currentUser; }

  function logout() { localStorage.removeItem('currentUser'); window.location.href = 'BatSignup.html'; }

  window.addEventListener('DOMContentLoaded', () => {
    if(!currentUser) return;
    
    const db = JSON.parse(localStorage.getItem('pennyDB')) || {};
    const userData = db[currentUser] || {};
    const formatNum = (num) => parseFloat(num || 0).toLocaleString();

    document.getElementById('disp-name').textContent = userData.userName || 'User';
    document.getElementById('dash-balance').textContent = `$${formatNum(userData.totalBalance)}`;
    document.getElementById('dash-efund').textContent = `$${formatNum(userData.emergencyFund)}`;
    document.getElementById('dash-spent').textContent = `$${formatNum(userData.spentMonth)}`;

    const ctx = document.getElementById('balanceChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Current'],
        datasets: [{
          label: 'Total Balance ($)',
          data: userData.chartData || [0,0,0,0,0,0],
          borderColor: '#2D6A4F', backgroundColor: 'rgba(45, 106, 79, 0.1)', borderWidth: 2, fill: true, tension: 0.3
        }]
      },
      options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });
  });
</script>
</body>
</html>
