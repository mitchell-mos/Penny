<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penny — Profile</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --navy: #1B2B4B; --green: #2D6A4F; --green-light: #EAF2EC; --green-mid: #52B788; --cream: #FAFAF7; --surface: #FFFFFF; --border: #E8E8E2; --text: #1B2B4B; --text-muted: #6B7280; --red: #C0392B; --red-light: #FDECEA;}
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  a { text-decoration: none; color: inherit; }
  .layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .sidebar { background: var(--navy); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
  .sidebar-logo { padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 10px; }
  .logo-coin { width: 34px; height: 34px; background: var(--green-mid); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px;}
  .logo-name { font-family: Georgia, serif; font-size: 18px; color: #fff; }
  .sidebar-nav { padding: 14px; flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 9px; font-size: 13.5px; color: rgba(255,255,255,0.55); margin-bottom: 4px; transition: 0.2s; }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
  .nav-item.on { background: rgba(82,183,136,0.18); color: var(--green-mid); }
  
  .main { display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
  .top-navbar { display: flex; justify-content: flex-end; align-items: center; padding: 12px 28px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 16px; position: sticky; top: 0; z-index: 10; }
  .top-navbar .user-tag { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .top-navbar .auth-btn { display: flex; align-items: center; gap: 6px; background: var(--red-light); color: var(--red); border: none; border-radius: 99px; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; }

  .content-pad { padding: 24px 28px; }
  .topbar { margin-bottom: 24px; }
  .greeting { font-family: Georgia, serif; font-size: 24px; font-weight: normal; }
  .greeting-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px; max-width: 500px; }
  .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
  .input-wrapper { position: relative; display: flex; align-items: center; }
  .input-prefix { position: absolute; left: 12px; font-size: 14px; color: var(--text-muted); }
  input { width: 100%; padding: 10px 12px 10px 26px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; background: var(--cream); }
  input:focus { border-color: var(--green); }
  .btn-full { width: 100%; background: var(--green); color: #fff; border: none; border-radius: 99px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .notification { background: var(--green-light); color: var(--green); padding: 12px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 16px; display: none; font-weight: 500; max-width: 500px; }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-coin"><i class="ti ti-coin"></i></div>
      <div class="logo-name">Penny</div>
    </div>
    <div class="sidebar-nav">
      <a href="BatIndex.html" class="nav-item"><i class="ti ti-home"></i> Dashboard</a>
      <a href="BatCreditCard.html" class="nav-item"><i class="ti ti-credit-card"></i> Card Strategy</a>
      <a href="BatServices.html" class="nav-item"><i class="ti ti-briefcase"></i> Services</a>
      <a href="BatProfile.html" class="nav-item on"><i class="ti ti-user"></i> Profile</a>
      <a href="BatAbout.html" class="nav-item"><i class="ti ti-info-circle"></i> About</a>
    </div>
  </div>

  <div class="main">
    <div class="top-navbar">
      <div class="user-tag"><i class="ti ti-user-circle"></i> <span id="topEmailLabel">Loading...</span></div>
      <button onclick="logout()" class="auth-btn"><i class="ti ti-logout"></i> Sign Out</button>
    </div>

    <div class="content-pad">
      <div class="topbar">
        <div class="greeting">Profile Settings</div>
        <div class="greeting-sub">Customize metrics database for <strong id="userEmailLabel"></strong>.</div>
      </div>

      <div id="saveNotif" class="notification"><i class="ti ti-check"></i> Profile Parameters Saved!</div>

      <div class="card">
        <div class="card-title"><i class="ti ti-settings"></i> Preferences</div>
        <div class="form-group">
          <label>User Display Name</label>
          <div class="input-wrapper">
            <i class="ti ti-user input-prefix"></i>
            <input type="text" id="userName" placeholder="Alex">
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-database"></i> Core Metrics Database</div>
        <div class="form-group">
          <label>Total Balance</label>
          <div class="input-wrapper">
            <span class="input-prefix">$</span>
            <input type="number" id="totalBalance" placeholder="3241">
          </div>
        </div>
        <div class="form-group">
          <label>Emergency Fund Amount</label>
          <div class="input-wrapper">
            <span class="input-prefix">$</span>
            <input type="number" id="emergencyFund" placeholder="2840">
          </div>
        </div>
        <div class="form-group">
          <label>Spent This Month</label>
          <div class="input-wrapper">
            <span class="input-prefix">$</span>
            <input type="number" id="spentMonth" placeholder="642">
          </div>
        </div>
        <div class="form-group">
          <label>Emergency Fund Target Goal</label>
          <div class="input-wrapper">
            <span class="input-prefix">$</span>
            <input type="number" id="emergencyGoal" placeholder="10000">
          </div>
        </div>
        <button class="btn-full" onclick="saveDatabaseData()"><i class="ti ti-device-floppy"></i> Save Local Changes</button>
      </div>
    </div>
  </div>
</div>

<script>
  const currentUser = localStorage.getItem('currentUser');
  if(!currentUser) { window.location.href = 'BatSignIn.html'; }
  else { 
    document.getElementById('userEmailLabel').textContent = currentUser; 
    document.getElementById('topEmailLabel').textContent = currentUser; 
  }

  function logout() { localStorage.removeItem('currentUser'); window.location.href = 'BatSignIn.html'; }

  window.addEventListener('DOMContentLoaded', () => {
    if(!currentUser) return;
    const db = JSON.parse(localStorage.getItem('pennyDB')) || {};
    const uData = db[currentUser] || {};
    
    document.getElementById('userName').value = uData.userName || '';
    document.getElementById('totalBalance').value = uData.totalBalance || '';
    document.getElementById('emergencyFund').value = uData.emergencyFund || '';
    document.getElementById('spentMonth').value = uData.spentMonth || '';
    document.getElementById('emergencyGoal').value = uData.emergencyGoal || '';
  });

  function saveDatabaseData() {
    let db = JSON.parse(localStorage.getItem('pennyDB')) || {};
    let uData = db[currentUser];

    uData.userName = document.getElementById('userName').value;
    uData.totalBalance = document.getElementById('totalBalance').value;
    uData.emergencyFund = document.getElementById('emergencyFund').value;
    uData.spentMonth = document.getElementById('spentMonth').value;
    uData.emergencyGoal = document.getElementById('emergencyGoal').value;

    if(!uData.chartData) uData.chartData = [0,0,0,0,0,0];
    uData.chartData[5] = parseFloat(uData.totalBalance || 0);

    db[currentUser] = uData;
    localStorage.setItem('pennyDB', JSON.stringify(db));
    localStorage.setItem('userName', uData.userName);

    const notif = document.getElementById('saveNotif');
    notif.style.display = 'block';
    setTimeout(() => { notif.style.display = 'none'; }, 3000);
  }
</script>
</body>
</html>
